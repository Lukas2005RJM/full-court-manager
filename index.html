<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07101d">
  <title>Full Court Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20">
</head>
<body>
  <div class="noise"></div>
  <header class="topbar">
    <a class="brand" href="#">FULL<span>COURT</span> <small>MANAGER</small></a>
    <div class="season-chip">PRO BASKETBALL · 2025/26</div>
  </header>
  <main>
    <section id="setup-screen" class="setup-screen">
      <div class="hero-copy">
        <p class="eyebrow">DEINE LIGA. DEINE ENTSCHEIDUNGEN.</p>
        <h1>ÜBERNIMM<br><em>DAS PARKETT.</em></h1>
        <p class="intro">Wähle eine der 30 NBA-Franchises und führe sie an die Spitze – oder kontrolliere die gesamte Liga.</p>
        <div id="existing-saves" class="existing-saves"></div>
      </div>
      <div class="setup-panel">
        <div class="panel-heading"><div><p class="step">SCHRITT 01</p><h2>Wen möchtest du managen?</h2></div><span id="selection-count">0 ausgewählt</span></div>
        <button id="all-teams" class="all-teams-card" type="button"><span class="all-icon">◎</span><span><strong>ALLE TEAMS VERWALTEN</strong><small>Volle Kontrolle über Transfers, Aufstellungen und Taktiken der gesamten Liga.</small></span><span class="check">✓</span></button>
        <div class="divider"><span>ODER WÄHLE EIN TEAM</span></div>
        <div id="team-grid" class="team-grid"></div>
        <div class="manager-row"><label for="manager-name">Managername</label><input id="manager-name" maxlength="24" value="Coach" autocomplete="off"></div>
        <div class="manager-row"><label for="save-slot">Speicherplatz</label><select id="save-slot"><option value="1">Slot 1</option><option value="2">Slot 2</option><option value="3">Slot 3</option></select></div>
        <button id="start-game" class="start-button" type="button" disabled>KARRIERE STARTEN <span>→</span></button>
      </div>
    </section>
    <section id="dashboard" class="dashboard hidden">
      <aside class="sidebar">
        <div id="active-team-mark" class="active-team-mark"></div>
        <nav>
          <button class="nav-item active" data-view="overview"><span>⌂</span>Übersicht</button>
          <button class="nav-item" data-view="roster" title="Kader & Verträge"><span>◫</span>Kader</button>
          <button class="nav-item" data-view="rotation" title="Rotation & Training"><span>↕</span>Rotation</button>
          <button class="nav-item" data-view="tactics"><span>◇</span>Taktiken</button>
          <button class="nav-item" data-view="schedule"><span>□</span>Spielplan</button>
          <button class="nav-item" data-view="standings"><span>≡</span>Tabelle</button>
          <button class="nav-item" data-view="transactions" title="Trades & Free Agency"><span>⇄</span>Trades</button>
          <button class="nav-item" data-view="draft" title="Draft & Entwicklung"><span>☆</span>Draft</button>
          <button class="nav-item" data-view="league" title="Liga & Awards"><span>♜</span>Liga</button>
          <button class="nav-item" data-view="playoffs"><span>♛</span>Playoffs</button>
        </nav>
        <button id="save-game" class="new-career">Spiel speichern</button>
        <button id="new-career" class="new-career">Karriere wechseln</button>
      </aside>
      <div class="dashboard-content">
        <div class="dash-head"><div><p class="eyebrow">FRANCHISE CONTROL CENTER</p><h2 id="welcome-title"></h2><p id="season-status" class="muted"></p></div><div class="head-controls"><select id="team-switcher" class="team-switcher"></select></div></div>
        <div id="view-content"></div>
      </div>
    </section>
  </main>
  <div id="game-modal" class="modal hidden"><div class="modal-card"><button id="close-modal" class="modal-close">×</button><div id="modal-content"></div></div></div>
  <script src="rosters.js?v=16"></script>
  <script src="app.js?v=20"></script>
</body>
</html>
